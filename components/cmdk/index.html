<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@2.0.0/dist/streamlit-component-lib.min.js"></script>
<style>
  body { margin: 0; padding: 0; overflow: hidden; }
  #cmdk-backdrop {
    position: fixed; inset: 0;
    background: rgba(14,20,38,0.35); backdrop-filter: blur(4px);
    z-index: 99999; display: none; place-items: start center; padding-top: 12vh;
  }
  #cmdk-backdrop.open { display: grid; animation: cmdk-fade 0.2s; }
  @keyframes cmdk-fade { from { opacity: 0; } }
  #cmdk-modal {
    width: 560px; max-width: 90vw; background: #fff; border-radius: 14px;
    box-shadow: 0 20px 48px rgba(14,20,38,0.14), 0 0 0 1px rgba(14,20,38,0.06);
    overflow: hidden; animation: cmdk-rise 0.22s cubic-bezier(.2,.9,.3,1.1);
    font-family: 'Inter', system-ui, sans-serif;
  }
  @keyframes cmdk-rise { from { transform: translateY(-10px) scale(0.97); opacity: 0; } }
  #cmdk-header {
    display: flex; align-items: center; gap: 10px; padding: 14px 18px;
    border-bottom: 1px solid #e6e8ef;
  }
  #cmdk-input {
    flex: 1; border: none; outline: none; font-size: 16px;
    font-family: 'Inter', system-ui, sans-serif; background: transparent; color: #0f1524;
  }
  #cmdk-input::placeholder { color: #8a90a2; }
  .cmdk-kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; background: #eef0f6;
    border: 1px solid #e6e8ef; border-radius: 4px; padding: 1px 6px; color: #8a90a2;
  }
  #cmdk-list { max-height: 50vh; overflow-y: auto; padding: 6px; }
  .cmdk-group {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em;
    color: #8a90a2; font-weight: 600; padding: 10px 12px 4px;
  }
  .cmdk-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: 10px; font-size: 14px; cursor: pointer;
    font-family: 'Inter', system-ui, sans-serif; color: #0f1524;
  }
  .cmdk-item.on { background: #eef0f6; }
  .cmdk-item:hover { background: #eef0f6; }
  .cmdk-dot { width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0; }
  .cmdk-grp { font-size: 11px; color: #8a90a2; margin-left: auto; }
  #cmdk-foot {
    padding: 8px 16px; border-top: 1px solid #e6e8ef; display: flex;
    align-items: center; gap: 14px; font-size: 11px; color: #8a90a2;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .cmdk-search-icon { flex-shrink: 0; color: #8a90a2; }
</style>
</head>
<body>
<div id="cmdk-backdrop">
  <div id="cmdk-modal">
    <div id="cmdk-header">
      <svg class="cmdk-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="cmdk-input" placeholder="Jump to page…" autocomplete="off" />
      <span class="cmdk-kbd">ESC</span>
    </div>
    <div id="cmdk-list"></div>
    <div id="cmdk-foot">
      <span><span class="cmdk-kbd">↑↓</span> navigate</span>
      <span><span class="cmdk-kbd">↵</span> select</span>
      <span id="cmdk-count" style="margin-left:auto;"></span>
    </div>
  </div>
</div>

<script>
// Color map (CSS variables don't work inside iframe — use hex)
const COLOR_MAP = {
  'var(--g-dash)': '#6366f1',
  'var(--g-ops)': '#08a86b',
  'var(--g-risk)': '#e5484d',
  'var(--g-daily)': '#f59f00',
  'var(--g-mkt)': '#8b5cf6',
  'var(--g-ai)': '#0ea5a4',
  'var(--g-deep)': '#0d6efd',
  'var(--g-admin)': '#0f1524',
};

let ITEMS = [];
let isOpen = false;
let idx = 0;
let filtered = [];

const backdrop = document.getElementById('cmdk-backdrop');
const input = document.getElementById('cmdk-input');
const list = document.getElementById('cmdk-list');
const countEl = document.getElementById('cmdk-count');

function render() {
  const q = input.value.toLowerCase().trim();
  filtered = q
    ? ITEMS.filter(i => i.label.toLowerCase().includes(q) || i.group.toLowerCase().includes(q))
    : [...ITEMS];
  if (idx >= filtered.length) idx = 0;

  const groups = {};
  filtered.forEach((item, i) => {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push({...item, flatIdx: i});
  });

  let html = '';
  for (const [gname, items] of Object.entries(groups)) {
    html += `<div class="cmdk-group">${gname}</div>`;
    items.forEach(item => {
      const color = COLOR_MAP[item.color] || item.color || '#8a90a2';
      html += `<div class="cmdk-item ${item.flatIdx === idx ? 'on' : ''}"
                    data-idx="${item.flatIdx}" data-label="${item.label}">
        <div class="cmdk-dot" style="background:${color}"></div>
        <span>${item.label}</span>
        <span class="cmdk-grp">${item.group}</span>
      </div>`;
    });
  }
  list.innerHTML = html || '<div style="padding:28px 18px;text-align:center;color:#8a90a2;font-size:13px;">No matches</div>';
  countEl.textContent = filtered.length + ' results';

  list.querySelectorAll('.cmdk-item').forEach(el => {
    el.addEventListener('mouseenter', () => { idx = parseInt(el.dataset.idx); render(); });
    el.addEventListener('click', () => selectItem(el.dataset.label));
  });
}

function selectItem(label) {
  close();
  // Send selected page back to Python via Streamlit component API
  Streamlit.setComponentValue(label);
}

function open() {
  isOpen = true;
  backdrop.classList.add('open');
  input.value = '';
  idx = 0;
  render();
  setTimeout(() => input.focus(), 50);
}

function close() {
  isOpen = false;
  backdrop.classList.remove('open');
}

// Listen for ⌘K on the PARENT document (main Streamlit page)
try {
  window.parent.document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      isOpen ? close() : open();
    }
  });
} catch(err) {
  // Fallback: listen on iframe document
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      isOpen ? close() : open();
    }
  });
}

// Internal keyboard handlers
document.addEventListener('keydown', (e) => {
  if (!isOpen) return;
  if (e.key === 'Escape') { close(); e.preventDefault(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(filtered.length - 1, idx + 1); render(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(0, idx - 1); render(); }
  if (e.key === 'Enter') { e.preventDefault(); if (filtered[idx]) selectItem(filtered[idx].label); }
});

input.addEventListener('input', () => { idx = 0; render(); });
backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });

// Receive data from Python
function onRender(event) {
  const data = event.detail;
  if (data.args && data.args.pages) {
    ITEMS = data.args.pages;
    filtered = [...ITEMS];
  }
  Streamlit.setFrameHeight(0);
}

Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
Streamlit.setComponentReady();
Streamlit.setFrameHeight(0);
</script>
</body>
</html>
