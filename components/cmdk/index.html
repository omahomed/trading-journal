<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@2.0.0/dist/streamlit-component-lib.min.js"></script>
</head>
<body>
<script>
// This component injects a ⌘K palette into the PARENT document (so it's
// visible above Streamlit's UI) but uses Streamlit.setComponentValue() for
// bidirectional communication (so Python receives the selected page).

const doc = window.parent.document;

// Color map (CSS vars don't work in iframe context)
const COLORS = {
  'var(--g-dash)':'#6366f1', 'var(--g-ops)':'#08a86b', 'var(--g-risk)':'#e5484d',
  'var(--g-daily)':'#f59f00', 'var(--g-mkt)':'#8b5cf6', 'var(--g-ai)':'#0ea5a4',
  'var(--g-deep)':'#0d6efd', 'var(--g-admin)':'#0f1524',
};

let ITEMS = [];
let isOpen = false;
let idx = 0;
let filtered = [];

function ensureUI() {
  if (doc.getElementById('cmdk-backdrop')) return;

  const style = doc.createElement('style');
  style.textContent = `
    #cmdk-backdrop {
      position:fixed;inset:0;background:rgba(14,20,38,0.35);backdrop-filter:blur(4px);
      z-index:999999;display:none;place-items:start center;padding-top:12vh;
    }
    #cmdk-backdrop.open { display:grid; animation:cmdk-fade 0.15s; }
    @keyframes cmdk-fade { from { opacity:0; } }
    #cmdk-modal {
      width:560px;max-width:90vw;background:#fff;border-radius:14px;
      box-shadow:0 20px 48px rgba(14,20,38,0.14),0 0 0 1px rgba(14,20,38,0.06);
      overflow:hidden;font-family:'Inter',system-ui,sans-serif;
    }
    #cmdk-header {
      display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #e6e8ef;
    }
    #cmdk-input {
      flex:1;border:none;outline:none;font-size:16px;
      font-family:'Inter',system-ui,sans-serif;background:transparent;color:#0f1524;
    }
    #cmdk-input::placeholder { color:#8a90a2; }
    .cmdk-kbd {
      font-family:'JetBrains Mono',monospace;font-size:10px;background:#eef0f6;
      border:1px solid #e6e8ef;border-radius:4px;padding:1px 6px;color:#8a90a2;
    }
    #cmdk-list { max-height:50vh;overflow-y:auto;padding:6px; }
    .cmdk-group {
      font-size:10px;text-transform:uppercase;letter-spacing:0.10em;
      color:#8a90a2;font-weight:600;padding:10px 12px 4px;
    }
    .cmdk-item {
      display:flex;align-items:center;gap:10px;padding:9px 12px;
      border-radius:10px;font-size:14px;cursor:pointer;color:#0f1524;
    }
    .cmdk-item.on { background:#eef0f6; }
    .cmdk-item:hover { background:#eef0f6; }
    .cmdk-dot { width:8px;height:8px;border-radius:99px;flex-shrink:0; }
    .cmdk-grp { font-size:11px;color:#8a90a2;margin-left:auto; }
    #cmdk-foot {
      padding:8px 16px;border-top:1px solid #e6e8ef;display:flex;
      align-items:center;gap:14px;font-size:11px;color:#8a90a2;
    }
  `;
  doc.head.appendChild(style);

  const backdrop = doc.createElement('div');
  backdrop.id = 'cmdk-backdrop';
  backdrop.innerHTML = `
    <div id="cmdk-modal">
      <div id="cmdk-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:#8a90a2;">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="cmdk-input" placeholder="Jump to page…" autocomplete="off" />
        <span class="cmdk-kbd">ESC</span>
      </div>
      <div id="cmdk-list"></div>
      <div id="cmdk-foot">
        <span><span class="cmdk-kbd">↑↓</span> navigate</span>
        <span><span class="cmdk-kbd">↵</span> select</span>
        <span id="cmdk-count" style="margin-left:auto;"></span>
      </div>
    </div>
  `;
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closePalette(); });
  doc.body.appendChild(backdrop);
}

function render() {
  const input = doc.getElementById('cmdk-input');
  const list = doc.getElementById('cmdk-list');
  const countEl = doc.getElementById('cmdk-count');
  if (!input || !list) return;

  const q = input.value.toLowerCase().trim();
  filtered = q
    ? ITEMS.filter(i => i.label.toLowerCase().includes(q) || i.group.toLowerCase().includes(q))
    : [...ITEMS];
  if (idx >= filtered.length) idx = 0;

  const groups = {};
  filtered.forEach((item, i) => {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push({...item, flatIdx: i});
  });

  let html = '';
  for (const [gname, items] of Object.entries(groups)) {
    html += '<div class="cmdk-group">' + gname + '</div>';
    items.forEach(item => {
      const color = COLORS[item.color] || item.color || '#8a90a2';
      const cls = item.flatIdx === idx ? 'cmdk-item on' : 'cmdk-item';
      html += '<div class="' + cls + '" data-idx="' + item.flatIdx + '" data-label="' + item.label + '">'
        + '<div class="cmdk-dot" style="background:' + color + '"></div>'
        + '<span>' + item.label + '</span>'
        + '<span class="cmdk-grp">' + item.group + '</span>'
        + '</div>';
    });
  }
  list.innerHTML = html || '<div style="padding:28px;text-align:center;color:#8a90a2;font-size:13px;">No matches</div>';
  if (countEl) countEl.textContent = filtered.length + ' results';

  list.querySelectorAll('.cmdk-item').forEach(el => {
    el.addEventListener('mouseenter', () => { idx = parseInt(el.dataset.idx); render(); });
    el.addEventListener('click', () => selectItem(el.dataset.label));
  });
}

function selectItem(label) {
  closePalette();
  // Send back to Python via Streamlit component API
  Streamlit.setComponentValue(label);
}

function openPalette() {
  ensureUI();
  isOpen = true;
  const backdrop = doc.getElementById('cmdk-backdrop');
  if (backdrop) backdrop.classList.add('open');
  const input = doc.getElementById('cmdk-input');
  if (input) { input.value = ''; }
  idx = 0;
  render();
  setTimeout(() => { if (input) input.focus(); }, 50);
}

function closePalette() {
  isOpen = false;
  const backdrop = doc.getElementById('cmdk-backdrop');
  if (backdrop) backdrop.classList.remove('open');
}

// ⌘K listener on parent document
doc.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    isOpen ? closePalette() : openPalette();
  }
  if (!isOpen) return;
  if (e.key === 'Escape') { closePalette(); e.preventDefault(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(filtered.length - 1, idx + 1); render(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(0, idx - 1); render(); }
  if (e.key === 'Enter') { e.preventDefault(); if (filtered[idx]) selectItem(filtered[idx].label); }
});

// Also listen inside the palette's input for typing
// (input is in parent doc but keydown events bubble to parent doc listener above)

// Receive page list from Python
function onRender(event) {
  const data = event.detail;
  if (data.args && data.args.pages) {
    ITEMS = data.args.pages;
    filtered = [...ITEMS];
  }
  // Also wire up the input's input event for search filtering
  ensureUI();
  const input = doc.getElementById('cmdk-input');
  if (input && !input._wired) {
    input._wired = true;
    input.addEventListener('input', () => { idx = 0; render(); });
  }
  Streamlit.setFrameHeight(0);
}

Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
Streamlit.setComponentReady();
Streamlit.setFrameHeight(0);
</script>
</body>
</html>
